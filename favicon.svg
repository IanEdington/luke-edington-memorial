<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gradient background matching site colors -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B4E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C2185B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E65100;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="url(#bg)" rx="15"/>

  <!-- Music note (eighth note) -->
  <path d="M 65 20 L 65 60 C 65 65, 62 70, 55 70 C 48 70, 45 65, 45 60 C 45 55, 48 50, 55 50 C 58 50, 61 51, 63 53 L 63 30 L 75 25 L 75 33 L 65 36 Z"
        fill="#FFB300"
        stroke="#FFF8E1"
        stroke-width="1.5"/>

  <!-- Note head (circle at bottom) -->
  <ellipse cx="55" cy="60" rx="10" ry="8" fill="#FFB300" stroke="#FFF8E1" stroke-width="1.5"/>
</svg>
